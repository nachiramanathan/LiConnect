<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro Finder — Find Warm Introductions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" class="max-w-4xl mx-auto px-4 py-8">

    <!-- ═══ AUTH SCREEN ═══ -->
    <div id="auth-screen">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Intro Finder</h1>
        <p class="text-gray-500 mt-2">Find warm introductions through your network</p>
      </div>
      <div class="max-w-sm mx-auto bg-white rounded-xl shadow p-6">
        <div class="flex gap-2 mb-4">
          <button onclick="showTab('login')" id="tab-login" class="flex-1 py-2 text-sm font-medium rounded-lg bg-blue-50 text-blue-700">Log In</button>
          <button onclick="showTab('register')" id="tab-register" class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-500">Register</button>
        </div>
        <div id="login-form">
          <input id="login-email" type="email" placeholder="Email" class="w-full border rounded-lg px-3 py-2 mb-3" />
          <input id="login-password" type="password" placeholder="Password" class="w-full border rounded-lg px-3 py-2 mb-4" />
          <button onclick="login()" class="w-full bg-blue-600 text-white rounded-lg py-2 font-medium hover:bg-blue-700">Log In</button>
        </div>
        <div id="register-form" class="hidden">
          <input id="reg-name" type="text" placeholder="Your name" class="w-full border rounded-lg px-3 py-2 mb-3" />
          <input id="reg-email" type="email" placeholder="Email" class="w-full border rounded-lg px-3 py-2 mb-3" />
          <input id="reg-password" type="password" placeholder="Password" class="w-full border rounded-lg px-3 py-2 mb-4" />
          <button onclick="register()" class="w-full bg-blue-600 text-white rounded-lg py-2 font-medium hover:bg-blue-700">Create Account</button>
        </div>
        <p id="auth-error" class="text-red-500 text-sm mt-3 hidden"></p>
      </div>
    </div>

    <!-- ═══ MAIN SCREEN ═══ -->
    <div id="main-screen" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Intro Finder</h1>
        <div class="flex gap-3 items-center">
          <span id="user-name" class="text-sm text-gray-500"></span>
          <button onclick="logout()" class="text-sm text-gray-400 hover:text-gray-600">Log out</button>
        </div>
      </div>

      <!-- Search box -->
      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">Who do you want to reach?</label>
        <div class="flex gap-3">
          <input id="search-input" type="text" placeholder='e.g. "I want to reach customers of VeriPark"'
            class="flex-1 border rounded-lg px-4 py-3 text-lg" onkeydown="if(event.key==='Enter')search()" />
          <button onclick="search()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700">Search</button>
        </div>
      </div>

      <!-- Results -->
      <div id="results" class="hidden fade-in">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-lg font-semibold text-gray-800">Results</h2>
          <span id="result-count" class="text-sm text-gray-400"></span>
        </div>
        <div class="bg-white rounded-xl shadow overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-left text-gray-500">
              <tr>
                <th class="px-4 py-3">Name</th>
                <th class="px-4 py-3">Company</th>
                <th class="px-4 py-3">Position</th>
                <th class="px-4 py-3">Intro Via</th>
                <th class="px-4 py-3">Match</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Connected accounts section -->
      <div class="mt-8">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-lg font-semibold text-gray-800">Connected Accounts</h2>
          <button onclick="getConnectUrl()" class="text-sm bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
            + Connect LinkedIn
          </button>
        </div>
        <div id="accounts-list" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "";
    let token = localStorage.getItem("token");
    let userName = localStorage.getItem("userName");

    // ── Init ──
    if (token) showMain();

    function showTab(tab) {
      document.getElementById("login-form").classList.toggle("hidden", tab !== "login");
      document.getElementById("register-form").classList.toggle("hidden", tab !== "register");
      document.getElementById("tab-login").className = tab === "login"
        ? "flex-1 py-2 text-sm font-medium rounded-lg bg-blue-50 text-blue-700"
        : "flex-1 py-2 text-sm font-medium rounded-lg text-gray-500";
      document.getElementById("tab-register").className = tab === "register"
        ? "flex-1 py-2 text-sm font-medium rounded-lg bg-blue-50 text-blue-700"
        : "flex-1 py-2 text-sm font-medium rounded-lg text-gray-500";
    }

    async function login() {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        token = data.token;
        userName = data.user.name || data.user.email;
        localStorage.setItem("token", token);
        localStorage.setItem("userName", userName);
        showMain();
      } catch (err) { showAuthError(err.message); }
    }

    async function register() {
      const name = document.getElementById("reg-name").value;
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;
      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        token = data.token;
        userName = data.user.name || data.user.email;
        localStorage.setItem("token", token);
        localStorage.setItem("userName", userName);
        showMain();
      } catch (err) { showAuthError(err.message); }
    }

    function logout() {
      token = null;
      localStorage.removeItem("token");
      localStorage.removeItem("userName");
      document.getElementById("auth-screen").classList.remove("hidden");
      document.getElementById("main-screen").classList.add("hidden");
    }

    function showMain() {
      document.getElementById("auth-screen").classList.add("hidden");
      document.getElementById("main-screen").classList.remove("hidden");
      document.getElementById("user-name").textContent = userName;
      loadAccounts();
    }

    function showAuthError(msg) {
      const el = document.getElementById("auth-error");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    // ── Search ──
    async function search() {
      const query = document.getElementById("search-input").value;
      if (!query) return;

      const res = await fetch(`${API}/api/search`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ query, limit: 25 }),
      });
      const data = await res.json();

      document.getElementById("results").classList.remove("hidden");
      document.getElementById("result-count").textContent = `${data.count} results`;

      const tbody = document.getElementById("results-body");
      tbody.innerHTML = data.results.map(r => `
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-3">
            <a href="${r.linkedin_url}" target="_blank" class="text-blue-600 hover:underline font-medium">${r.name}</a>
            <div class="text-xs text-gray-400 mt-0.5">${r.headline || ""}</div>
          </td>
          <td class="px-4 py-3 text-gray-700">${r.company}</td>
          <td class="px-4 py-3 text-gray-700">${r.position}</td>
          <td class="px-4 py-3 text-gray-700">${r.introduced_by}</td>
          <td class="px-4 py-3">
            <span class="inline-block px-2 py-0.5 rounded text-xs font-medium
              ${parseFloat(r.similarity) > 0.5 ? "bg-green-100 text-green-700" :
                parseFloat(r.similarity) > 0.3 ? "bg-yellow-100 text-yellow-700" :
                "bg-gray-100 text-gray-500"}">${(r.similarity * 100).toFixed(1)}%</span>
          </td>
        </tr>
      `).join("");
    }

    // ── Accounts ──
    async function loadAccounts() {
      const res = await fetch(`${API}/api/accounts`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const accounts = await res.json();
      const el = document.getElementById("accounts-list");

      if (accounts.length === 0) {
        el.innerHTML = `<p class="text-gray-400 text-sm">No accounts connected yet. Click "+ Connect LinkedIn" to get started.</p>`;
        return;
      }

      el.innerHTML = accounts.map(a => `
        <div class="bg-white rounded-lg shadow-sm p-4 flex justify-between items-center">
          <div>
            <span class="font-medium">${a.linkedin_name || "LinkedIn Account"}</span>
            <span class="text-gray-400 text-sm ml-2">${a.connection_count} connections</span>
            <span class="text-gray-300 text-xs ml-2">Last synced: ${a.last_synced_at ? new Date(a.last_synced_at).toLocaleDateString() : "never"}</span>
          </div>
          <button onclick="syncAccount(${a.id})" class="text-sm text-blue-600 hover:underline">Sync now</button>
        </div>
      `).join("");
    }

    async function syncAccount(id) {
      const res = await fetch(`${API}/api/accounts/${id}/sync`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await res.json();
      alert(data.message);
      loadAccounts();
    }

    async function getConnectUrl() {
      const res = await fetch(`${API}/api/accounts/connect-url`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await res.json();
      if (data.url) window.open(data.url, "_blank");
      else alert("Failed to get connect URL: " + (data.error || "Unknown error"));
    }
  </script>
</body>
</html>
